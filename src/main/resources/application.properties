spring.data.mongodb.uri=${MONGO_URL:mongodb://localhost:27017/dev}

spring.freemarker.suffix=.ftl

knote.minio.host=${MINIO_HOST:localhost}
knote.minio.bucket=${MINIO_BUCKET:image-storage}
knote.minio.access.key=${MINIO_ACCESS_KEY:mykey}
knote.minio.secret.key=${MINIO_SECRET_KEY:mysecret}
knote.minio.useSSL=${MINIO_USE_SSL:false}
knote.minio.reconnect.enabled=${MINIO_RECONNECT_ENABLED:true}
